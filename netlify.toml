# Netlify deploy config for the a3b website (Astro static build).
# The site lives in /Website. Netlify cd's into `base` before running
# the build, so `command` and `publish` are relative to /Website.

[build]
  base = "Website"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-cache the fingerprinted/static assets — they never change in place.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers for a static marketing site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Astro builds a real 404.html — let Netlify serve it.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
